<!DOCTYPE html>
<html lang="en">
  <!-- Root HTML: Vite injects the bundled app script; #root is where React mounts. -->
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Metadata -->
    <title>Sidebar Menu Router – React, Vite, Context API & Custom CSS Demo</title>
    <meta name="description" content="A React app demonstrating sidebar navigation and modal dialogs with React Context API, Vite, and custom CSS. Open/close sidebar and modal globally with reusable components." />
    <meta name="author" content="Arnob Mahmud (https://www.arnobmahmud.com, contact@arnobmahmud.com)" />
    <meta name="keywords" content="React, Vite, sidebar, modal, Context API, JavaScript, custom CSS, global state, React hooks, sidebar menu, navigation" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://sidebar-router.vercel.app/" />
    <meta property="og:title" content="Sidebar Menu Router – React, Vite, Context API & Custom CSS Demo" />
    <meta property="og:description" content="A React app demonstrating sidebar navigation and modal dialogs with React Context API, Vite, and custom CSS." />
    <meta property="og:image" content="https://sidebar-router.vercel.app/vite.svg" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Sidebar Menu Router – React, Vite, Context API & Custom CSS Demo" />
    <meta name="twitter:description" content="A React app demonstrating sidebar navigation and modal dialogs with React Context API, Vite, and custom CSS." />
  </head>
  <body>
    <div id="root"></div>
    <!-- type="module" loads main.jsx as ES module; Vite resolves and bundles in dev/build -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
